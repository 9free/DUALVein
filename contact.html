<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us – DUALVein</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #ffffff;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 20px 60px;
      display: flex;
      justify-content: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      z-index: 100;
    }

    nav ul {
      display: flex;
      gap: 50px;
      list-style: none;
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: 600;
    }

    nav a:hover { color: #1E90FF; }

    .contact-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 40px;
      background: linear-gradient(135deg, #1E90FF, #00B9D6, #32CD32);
      color: white;
      text-align: center;
    }

    .contact-box {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      padding: 60px;
      border-radius: 30px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .contact-box h1 {
      font-size: 3.2rem;
      font-weight: 900;
      margin-bottom: 20px;
    }

    .contact-box p {
      font-size: 1.4rem;
      margin-bottom: 40px;
      opacity: 0.95;
    }

    .email-link {
      display: inline-block;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1E90FF;
      background: white;
      padding: 18px 40px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    .email-link:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    @media (max-width: 768px) {
      .contact-box h1 { font-size: 2.4rem; }
      .contact-box p { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="learning.html">Learning Hub</a></li>
    <li><a href="product.html">Product</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
</nav>

<section class="contact-section">
  <div class="contact-box">
    <h1>Contact DUALVein</h1>
    <p>For partnerships, demos, or inquiries, reach out to us directly.</p>
    <a class="email-link" href="mailto:dualvein@outlook.com">
      dualvein@outlook.com
    </a>
  </div>
</section>

</body>
</html>
